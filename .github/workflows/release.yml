name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
            args: --bundles nsis
          - os: macos-latest
            artifact: macos-aarch64
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - os: macos-13
            artifact: macos-x86_64
            rustTarget: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}
      - name: Validate signing secret
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY secret is required for signed updater artifacts."
            exit 1
          }
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Install uv for bundled runtime
        run: python -m pip install uv==0.9.8
      - name: Prepare bundled uv and Python
        run: pnpm prepare:runtime-assets
      - name: Frontend build
        run: pnpm build
      - name: Security config check
        run: pnpm verify:security
      - name: Bundle config check
        run: pnpm verify:bundle-config
      - name: Install Playwright browser
        run: pnpm exec playwright install chromium
      - name: UI smoke
        run: pnpm test:ui
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: GSDesk ${{ github.ref_name }}
          releaseBody: See the assets below to install or update GSDesk.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets
          Get-ChildItem src-tauri/target -Recurse -Directory -Filter bundle |
            Where-Object { $_.FullName -match "[\\/]release[\\/]bundle$" } |
            ForEach-Object {
              Get-ChildItem $_.FullName -Recurse -File |
                Where-Object {
                  $_.Extension -in ".exe", ".msi", ".dmg", ".zip", ".sig", ".json" -or
                  $_.Name.EndsWith(".tar.gz") -or
                  $_.Name.EndsWith(".tar.gz.sig")
                } |
                ForEach-Object { Copy-Item $_.FullName release-assets/ -Force }
            }
      - name: Verify release assets
        shell: pwsh
        run: |
          $platform = "${{ startsWith(matrix.artifact, 'macos') && 'macos' || 'windows' }}"
          pnpm verify:release-assets -- --dir release-assets --platform $platform --write
          $source = "release-assets/SHA256SUMS-$platform.txt"
          $target = "release-assets/SHA256SUMS-${{ matrix.artifact }}.txt"
          if ($source -ne $target) {
            Move-Item -Path $source -Destination $target -Force
          }
      - uses: actions/upload-artifact@v4
        with:
          name: gsdesk-checksum-${{ matrix.artifact }}
          path: release-assets/SHA256SUMS-${{ matrix.artifact }}.txt

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gsdesk-checksum-*
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-assets/SHA256SUMS-*.txt
